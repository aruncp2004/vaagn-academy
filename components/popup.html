<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <button class="popup-close" id="popupClose" aria-label="Close">&times;</button>
    <div style="margin-bottom:16px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-primary);margin-bottom:8px;">Limited Seats</div>
      <h3 style="font-size:22px;font-weight:700;color:var(--color-dark);margin-bottom:8px;">Get a Free Counselling Call</h3>
      <p style="font-size:13px;color:var(--color-gray);line-height:1.6;">Talk to our EV career experts — find the right program, batch, and mode for you.</p>
    </div>
    <form id="popupForm" style="display:flex;flex-direction:column;gap:12px;">
      <input type="text" name="name" placeholder="Your Name" required
        style="border:1px solid var(--color-border);border-radius:var(--radius-md);padding:10px 14px;font-size:14px;outline:none;font-family:inherit;">
      <input type="tel" name="phone" placeholder="Phone Number" required
        style="border:1px solid var(--color-border);border-radius:var(--radius-md);padding:10px 14px;font-size:14px;outline:none;font-family:inherit;">
      <button type="submit" class="btn-primary" style="justify-content:center;">Book Free Call</button>
    </form>
  </div>
</div>
